<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>문73</title>
    <script src="reg_member.js"></script>
    <link rel="stylesheet" href="a.css" />
  </head>

  <body>
    <div id="reg_block">
      <h1>회원가입</h1>
      <form action="">
        <p><span>아이디: </span><input type="text" id="id" /><br /></p>
        <p><span>비밀번호: </span><input type="password" id="pw" /> <br /></p>
        <p>
          <span>비밀번호 확인:</span><input type="password" id="pw_check" />
          <br />
        </p>
        <p><span>이름: </span><input type="text" id="name" /><br /></p>
        <p>
          <span>생년월일: </span>
          <input type="number" name="" id="" /><span>년 </span>
          <select name="month" id="birth_month">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
            <option value="11">11</option>
            <option value="12">12</option>
          </select>
          <span>월 </span>
          <!-- <input type="number" name="day" id="birth_day_box" /> -->
          <select name="day" id="birth_day">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
            <option value="11">11</option>
            <option value="12">12</option>
            <option value="13">13</option>
            <option value="14">14</option>
            <option value="15">15</option>
            <option value="16">16</option>
            <option value="17">17</option>
            <option value="18">18</option>
            <option value="19">19</option>
            <option value="20">20</option>
            <option value="21">21</option>
            <option value="22">22</option>
            <option value="23">23</option>
            <option value="24">24</option>
            <option value="25">25</option>
            <option value="26">26</option>
            <option value="27">27</option>
            <option value="28">28</option>
            <option value="29">29</option>
            <option value="30">30</option>
            <option value="31">31</option>
          </select>
          <span>일 </span>
        </p>
        <p>
          <span>성별: </span>
          <input type="radio" name="sex" value="M" /><span>남성</span>
          <input type="radio" name="sex" value="F" /><span>여성</span>
          <input type="radio" name="sex" value="X" /><span>비공개</span>
        </p>
        <p>
          <span>전화번호: <input type="text" /></span>
        </p>
        <input type="button" src="reg_member.html" value="회원가입" /> <br />
      </form>
    </div>
  </body>
</html>
