<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>AI 게시판</title>
  </head>
  <body>
    <h2>기록 목록</h2>
    <a href="/write">새 글 쓰기</a>

    <table border="1">
      <thead>
        <tr>
          <th>번호</th>
          <th>제목</th>
          <th>작성자</th>
          <th>날짜</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="p : ${posts}">
          <td th:text="${p.no}">번호</td>
          <td>
            <a th:href="@{/read(no=${p.no})}" th:text="${p.title}">제목</a>
            <!--                    <span th:text="${p.emoji}"></span>-->
          </td>
          <td th:text="${p.id}">작성자</td>
          <td th:text="${#temporals.format(p.regDate, 'yyyy-MM-dd')}">날짜</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
